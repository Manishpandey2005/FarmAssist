version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: agriculture_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: agriculture
    volumes:
      - mongodb_data:/data/db

  backend:
    build: .
    container_name: agriculture_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/agriculture
      - SECRET_KEY=your-super-secret-key-here
      - OPENWEATHER_API_KEY=your-openweather-api-key
      - FLASK_ENV=production
    depends_on:
      - mongodb
    volumes:
      - ./models:/app/ml_models
      - ./uploads:/app/uploads

volumes:
  mongodb_data: